<!-- templates/mini_fb/show_all_profiles.html -->


{% extends 'mini_fb/base.html' %}

{% block content %}
  

    <table border="1">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>City</th>
                <th>Email</th>
                <th>Profile</th>
            </tr>
        </thead>
        <tbody>
            {% for profile in profiles %}
                <tr>
                    <td>{{ profile.first_name }}</td>
                    <td>{{ profile.last_name }}</td>
                    <td>{{ profile.city }}</td>
                    <td>{{ profile.email_address }}</td>
                    <td><img src="{{ profile.profile_image_url }}" alt="Profile Image" width="100"></td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
