<!-- templates/mini_fb/show_all_profiles.html -->


{% extends 'mini_fb/base.html' %}


{% block content %}
    <table border="1">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>City</th>
                <th>Email</th>
                <th>Profile</th>
            </tr>
        </thead>
        <tbody>
            {% for profile in profiles %}
            <!-- For each record in the Profile table we will display all attributes (first_name, last_name, city, email_address, profile_image)-->
                <tr>
                    <td><a href="{% url 'show_profile' profile.pk %}">{{ profile.first_name }}</a></td>
                    <td>{{ profile.last_name }}</td>
                    <td>{{ profile.city }}</td>
                    <td>{{ profile.email_address }}</td>
                    <td><a href="{% url 'show_profile' profile.pk %}"><img src="{{ profile.profile_image_url }}" alt="Profile Image" width="100"></a></td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
